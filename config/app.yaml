app:
  name: ETF投资纪律助手
  base_currency: CNY
  timezone: Asia/Shanghai

portfolio:
  total_plan_amount: 100000.0
  max_total_position: 0.8
  normal_position: 0.5
  min_cash_position: 0.2

risk_profile:
  name: 平衡型
  description: 以宽基ETF为核心，控制科创类高波动仓位，保留现金用于分批补仓。

strategy:
  trend:
    ma_short: 20
    ma_mid: 60
    ma_long: 120
    ma_year: 250
  drawdown:
    small_buy_threshold: -0.03
    normal_buy_threshold: -0.05
    large_buy_threshold: -0.1
    extreme_threshold: -0.15
  anti_chase:
    five_day_gain_warning: 0.05
    ten_day_gain_warning: 0.08
  score:
    base_score: 50
    min_score: 0
    max_score: 100

actions:
  strong_buy:
    min_score: 80
    label: 可正常买入
  small_buy:
    min_score: 65
    label: 可小额买入
  fixed_invest:
    min_score: 50
    label: 只按定投计划
  hold:
    min_score: 35
    label: 观察，不主动买入
  stop_buy:
    min_score: 0
    label: 暂停买入
